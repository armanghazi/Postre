name: Sync to Hugging Face
on:
  push:
    branches: [main]
  force_push: true
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://ghaziaskari:$HF_TOKEN@huggingface.co/spaces/ghaziaskari/Dessert main
